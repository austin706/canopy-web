<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#8B9A6B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Panel frame (tilted perspective) -->
  <path d="M25 140 L55 50 L175 50 L145 140 Z"/>
  <!-- Horizontal grid lines -->
  <line x1="35" y1="110" x2="155" y2="110"/>
  <line x1="45" y1="80" x2="165" y2="80"/>
  <!-- Vertical grid lines -->
  <line x1="65" y1="50" x2="35" y2="140"/>
  <line x1="95" y1="50" x2="65" y2="140"/>
  <line x1="125" y1="50" x2="95" y2="140"/>
  <line x1="155" y1="50" x2="125" y2="140"/>
  <!-- Mounting stand -->
  <line x1="70" y1="140" x2="80" y2="170"/>
  <line x1="120" y1="140" x2="110" y2="170"/>
  <line x1="65" y1="170" x2="125" y2="170"/>
  <!-- Sun in corner -->
  <circle cx="30" cy="35" r="10" stroke-width="3"/>
  <line x1="30" y1="20" x2="30" y2="14" stroke-width="2.5"/>
  <line x1="15" y1="35" x2="9" y2="35" stroke-width="2.5"/>
  <line x1="20" y1="25" x2="16" y2="21" stroke-width="2.5"/>
  <line x1="40" y1="25" x2="44" y2="21" stroke-width="2.5"/>
</svg>
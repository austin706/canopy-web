# ──────────────────────────────────────────────────────────────────────────
# Canopy-Web — Playwright E2E smoke tests (DX-2)
#
# Five conversion-funnel specs run against a local dev server with stubbed
# Supabase responses. Keeps the funnel from silently regressing on PRs.
#
# Covered specs (see CANOPY_DESIGN_AUDIT.md §DX-2):
#   1. landing → signup
#   2. signup → onboarding
#   3. onboarded user → dashboard
#   4. dashboard → upgrade
#   5. add-ons quote request
# ──────────────────────────────────────────────────────────────────────────
name: E2E Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Canopy Home — smart home maintenance tracking, weather alerts, equipment management, and seasonal task reminders for homeowners.">
    <meta name="theme-color" content="#7A8B6F">
    <!--
      Google Search Console verification.
      Set VITE_GSC_VERIFICATION in Vercel env (or .env) to the verification token
      Google provides you (e.g. "abc123..."). Vite substitutes %VITE_GSC_VERIFICATION%
      at build time. If unset, the content attribute is empty and Google ignores it.
    -->
    <meta name="google-site-verification" content="%VITE_GSC_VERIFICATION%">
    <!--
      CSP is set via vercel.json headers (includes wss://*.supabase.co, Sentry, Stripe, USPS).
      Do NOT duplicate here — meta-tag CSP overrides headers and causes Safari failures.
    -->
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://canopyhome.app/">
    <meta property="og:title" content="Canopy — Smart Home Maintenance">
    <meta property="og:description" content="Track equipment, manage maintenance tasks, get weather alerts, and keep your home in peak condition with AI-powered insights.">
    <meta property="og:image" content="https://canopyhome.app/canopy-watercolor-logo.png">
    <meta property="og:site_name" content="Canopy Home">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Canopy — Smart Home Maintenance">
    <meta name="twitter:description" content="Track equipment, manage maintenance tasks, get weather alerts, and keep your home in peak condition with AI-powered insights.">
    <meta name="twitter:image" content="https://canopyhome.app/canopy-watercolor-logo.png">
    <link rel="canonical" href="https://canopyhome.app/" />
    <title>Canopy — Smart Home Maintenance</title>
    <link rel="icon" type="image/svg+xml" href="/canopy-logo.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/canopy-app-icon-1024.png">
    <link rel="manifest" href="/manifest.json">
    <!-- Preload hero logo in AVIF (primary format for fastest LCP) -->
    <link rel="preload" as="image" href="/canopy-watercolor-logo.avif" type="image/avif" />
    <!-- Structured Data — SoftwareApplication + LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "Canopy Home",
          "url": "https://canopyhome.app",
          "applicationCategory": "LifestyleApplication",
          "operatingSystem": "Web, iOS, Android",
          "description": "Smart home maintenance platform with AI-powered task tracking, equipment management, weather alerts, and professional service scheduling for homeowners.",
          "offers": [
            {
              "@type": "Offer",
              "name": "Free",
              "price": "0",
              "priceCurrency": "USD",
              "description": "Basic maintenance calendar, 3 equipment slots, and generic checklists for single home"
            },
            {
              "@type": "Offer",
              "name": "Home",
              "price": "6.99",
              "priceCurrency": "USD",
              "description": "All 44 AI-powered maintenance tasks, unlimited equipment, personalized checklists, weather alerts, secure notes vault, lawn and pool care"
            },
            {
              "@type": "Offer",
              "name": "Home 2-Pack",
              "price": "11.99",
              "priceCurrency": "USD",
              "description": "All Home Plan features for two homes — ideal for rentals, second homes, or family properties"
            },
            {
              "@type": "Offer",
              "name": "Pro",
              "price": "149.00",
              "priceCurrency": "USD",
              "description": "Everything in Home Plan plus bimonthly 2-hour professional maintenance visit with HVAC, plumbing, safety testing, and seasonal inspection report"
            },
            {
              "@type": "Offer",
              "name": "Pro 2-Pack",
              "price": "279.00",
              "priceCurrency": "USD",
              "description": "All Pro Plan features for two homes, including bimonthly maintenance visits for each property"
            },
            {
              "@type": "Offer",
              "name": "Pro+",
              "priceSpecification": {
                "@type": "PriceSpecification",
                "priceCurrency": "USD",
                "price": "0",
                "description": "Custom concierge pricing — contact sales"
              },
              "description": "Full home concierge with dedicated pro provider, all add-on services included, priority scheduling, and custom service plan. Custom pricing."
            }
          ],
          "creator": {
            "@type": "Organization",
            "name": "Canopy Home",
            "url": "https://canopyhome.app"
          }
        },
        {
          "@type": "LocalBusiness",
          "name": "Canopy Home",
          "url": "https://canopyhome.app",
          "description": "Home maintenance management and professional service provider serving Tulsa, Oklahoma.",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Tulsa",
            "addressRegion": "OK",
            "addressCountry": "US"
          },
          "areaServed": {
            "@type": "City",
            "name": "Tulsa",
            "containedInPlace": {
              "@type": "State",
              "name": "Oklahoma"
            }
          },
          "priceRange": "$0 - $149/mo"
        }
      ]
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F1EBDD;
        z-index: 9999;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        transition: opacity 0.3s ease;
      }
      #app-loader.fade-out { opacity: 0; pointer-events: none; }
      #app-loader svg { width: 64px; height: 64px; margin-bottom: 16px; animation: pulse 2s ease-in-out infinite; }
      #app-loader p { color: #7A8B6F; font-size: 14px; font-weight: 500; letter-spacing: 0.5px; margin: 0; }
      #app-loader .bar { width: 120px; height: 3px; background: #e0d9c8; border-radius: 3px; margin-top: 16px; overflow: hidden; }
      #app-loader .bar::after { content: ''; display: block; width: 40%; height: 100%; background: #B87333; border-radius: 3px; animation: slide 1.2s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
      @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#7A8B6F"/>
        <path d="M32 12C32 12 20 22 20 36C20 42.6 25.4 48 32 48C38.6 48 44 42.6 44 36C44 22 32 12 32 12Z" fill="#F1EBDD" stroke="#F1EBDD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M32 28V42M32 42C28 38 26 34 26 32M32 42C36 38 38 34 38 32" stroke="#7A8B6F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Loading Canopy</p>
      <div class="bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
